name: CodeQL

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    # Weekly scan so newly published queries catch regressions between commits.
    - cron: "27 3 * * 1"

jobs:
  analyze:
    name: Analyze (python)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          # Security-focused suite: keeps all security queries but drops the
          # code-quality/style "Note" rules that are noise for offensive tooling
          # (empty except, unused global, import style, etc.).
          queries: security-extended
          # Analyze the shipped library only; examples and tests are not shipped.
          config: |
            paths-ignore:
              - examples
              - tests

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"

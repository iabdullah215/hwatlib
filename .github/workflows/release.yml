name: Release

# Publishes hwatlib to PyPI with a verifiable supply chain:
#   1. Build sdist + wheel (reproducible, from a clean checkout).
#   2. Generate a CycloneDX SBOM for the built distribution.
#   3. Attest SLSA build provenance for the artifacts (GitHub attestations).
#   4. Publish to PyPI via Trusted Publishing (OIDC) — no API tokens.
#   5. Sign the artifacts with Sigstore and attach the signatures + SBOM to
#      the GitHub Release so consumers can verify provenance.
#
# Trigger: publishing a GitHub Release (the tag drives the version). A
# workflow_dispatch entry point is provided for TestPyPI dry runs.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      target:
        description: "Publish target"
        required: true
        default: "testpypi"
        type: choice
        options:
          - testpypi
          - pypi

permissions: {}

jobs:
  build:
    name: Build distribution + SBOM
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required for actions/attest-build-provenance to mint the attestation.
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Twine metadata check
        run: twine check dist/*

      - name: Generate CycloneDX SBOM
        # Install the built wheel into an isolated venv so the SBOM reflects
        # exactly the runtime dependency closure of what ships to PyPI. Running
        # cyclonedx-py from inside that venv (no positional arg) introspects it.
        run: |
          python -m venv .sbom-venv
          .sbom-venv/bin/python -m pip install --upgrade pip
          .sbom-venv/bin/python -m pip install dist/*.whl "cyclonedx-bom>=4,<7"
          .sbom-venv/bin/cyclonedx-py environment \
            --output-format JSON \
            --output-file hwatlib.cdx.json
          rm -rf .sbom-venv

      - name: Attest build provenance for artifacts
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "dist/*"

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: hwatlib.cdx.json
          if-no-files-found: error

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    if: github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi'
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/project/hwatlib/
    permissions:
      # OIDC token for PyPI Trusted Publishing.
      id-token: write
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish to PyPI
    needs: build
    # Real publishes happen on a Release, or on an explicit manual pypi dispatch.
    if: >-
      github.event_name == 'release' ||
      (github.event_name == 'workflow_dispatch' && inputs.target == 'pypi')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/hwatlib/
    permissions:
      # OIDC token for PyPI Trusted Publishing — no username/password/token.
      id-token: write
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  sign-and-attach:
    name: Sign artifacts + attach to Release
    needs: [build, publish-pypi]
    # Only relevant for real releases; signatures are attached to the Release.
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      # id-token for Sigstore keyless signing; contents for the Release upload.
      id-token: write
      contents: write
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Download SBOM
        uses: actions/download-artifact@v4
        with:
          name: sbom
          path: .

      - name: Sign artifacts with Sigstore
        uses: sigstore/gh-action-sigstore-python@v3.0.0
        with:
          inputs: >-
            ./dist/*.whl
            ./dist/*.tar.gz
            ./hwatlib.cdx.json

      - name: Attach signatures + SBOM to the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            dist/*.sigstore.json \
            hwatlib.cdx.json hwatlib.cdx.json.sigstore.json \
            --clobber
